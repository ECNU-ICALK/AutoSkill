name: autoskill4openclaw-ci

on:
  push:
    paths:
      - "AutoSkill4OpenClaw/**"
      - "autoskill/**"
      - "examples/**"
      - "pyproject.toml"
      - ".github/workflows/autoskill4openclaw-ci.yml"
  pull_request:
    paths:
      - "AutoSkill4OpenClaw/**"
      - "autoskill/**"
      - "examples/**"
      - "pyproject.toml"
      - ".github/workflows/autoskill4openclaw-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run AutoSkill4OpenClaw Python tests
        run: python -m unittest discover -s AutoSkill4OpenClaw/tests -q

      - name: Run AutoSkill4OpenClaw adapter tests
        working-directory: AutoSkill4OpenClaw/adapter
        run: npm test
